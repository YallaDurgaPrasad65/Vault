<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Dashboard | Secure File Storage">
    <title>Dashboard | File Storage</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="dashboard.css">
    <link rel="icon" href="favicon.svg" type="image/svg+xml">
</head>

<body>
    <div class="bg">
        <div class="orb orb-1"></div>
        <div class="orb orb-2"></div>
        <div class="orb orb-3"></div>
    </div>

    <div class="dashboard-container">
        <header class="top-nav">
            <div class="brand">
                <div class="logo">
                    <svg viewBox="0 0 40 40" fill="none">
                        <path d="M20 4L36 12V28L20 36L4 28V12L20 4Z" stroke="url(#g1)" stroke-width="2.5" />
                        <path d="M20 10L30 16V26L20 32L10 26V16L20 10Z" fill="url(#g1)" opacity="0.3" />
                        <circle cx="20" cy="20" r="5" fill="url(#g1)" />
                        <defs>
                            <linearGradient id="g1" x1="4" y1="4" x2="36" y2="36">
                                <stop stop-color="#6366f1" />
                                <stop offset="1" stop-color="#a855f7" />
                            </linearGradient>
                        </defs>
                    </svg>
                </div>
                <h2>Vault</h2>
            </div>
            
            <div class="user-menu">
                <div class="user-info">
                    <span id="user-greeting">Welcome</span>
                </div>
                <button id="btn-logout" class="btn-logout">Logout</button>
            </div>
        </header>

        <main class="dashboard-content">
            <!-- Upload Section -->
            <section class="upload-section">
                <div class="upload-zone" id="upload-zone">
                    <input type="file" id="file-input" style="display: none;">
                    <div class="upload-content">
                        <svg class="upload-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4" />
                            <polyline points="17 8 12 3 7 8" />
                            <line x1="12" y1="3" x2="12" y2="15" />
                        </svg>
                        <h3>Drag & drop files here</h3>
                        <p>or click to browse files</p>
                        <span class="upload-limit">Max size: 50MB</span>
                    </div>
                </div>
                <div id="upload-progress-container" class="progress-container" style="display: none;">
                    <div class="progress-info">
                        <span id="upload-filename">file.pdf</span>
                        <span id="upload-percentage">0%</span>
                    </div>
                    <div class="progress-bar-bg">
                        <div id="upload-progress-bar" class="progress-bar"></div>
                    </div>
                </div>
            </section>

            <!-- Tools Section -->
            <section class="tools-section">
                <div class="search-bar">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <circle cx="11" cy="11" r="8" />
                        <line x1="21" y1="21" x2="16.65" y2="16.65" />
                    </svg>
                    <input type="text" id="search-input" placeholder="Search files...">
                </div>
            </section>

            <!-- Files Section -->
            <section class="files-section">
                <div class="section-header">
                    <h3>My Files</h3>
                    <span id="file-count" class="badge">0 items</span>
                </div>

                <div id="empty-state" class="empty-state">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
                        <path d="M13 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V9z" />
                        <polyline points="13 2 13 9 20 9" />
                    </svg>
                    <h4>No files yet</h4>
                    <p>Upload a file to get started.</p>
                </div>

                <div id="file-grid" class="file-grid">
                    <!-- Files will be injected here -->
                </div>
            </section>
        </main>
    </div>

    <!-- Preview Modal -->
    <div id="preview-modal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h3 id="preview-title">Filename</h3>
                <button id="close-preview" class="btn-close">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <line x1="18" y1="6" x2="6" y2="18" />
                        <line x1="6" y1="6" x2="18" y2="18" />
                    </svg>
                </button>
            </div>
            <div class="modal-body" id="preview-container">
                <!-- Preview content -->
            </div>
        </div>
    </div>

    <script src="dashboard.js"></script>
</body>

</html>
