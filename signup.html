<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Create your account">
    <title>Sign Up | Vault</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <link rel="icon" href="favicon.svg" type="image/svg+xml">
</head>

<body>
    <div class="bg">
        <div class="orb orb-1"></div>
        <div class="orb orb-2"></div>
        <div class="orb orb-3"></div>
    </div>

    <main class="container">
        <div class="login-card" id="signup-card">
            <div class="brand">
                <div class="logo">
                    <svg viewBox="0 0 40 40" fill="none">
                        <path d="M20 4L36 12V28L20 36L4 28V12L20 4Z" stroke="url(#g1)" stroke-width="2.5" />
                        <path d="M20 10L30 16V26L20 32L10 26V16L20 10Z" fill="url(#g1)" opacity="0.3" />
                        <circle cx="20" cy="20" r="5" fill="url(#g1)" />
                        <defs>
                            <linearGradient id="g1" x1="4" y1="4" x2="36" y2="36">
                                <stop stop-color="#6366f1" />
                                <stop offset="1" stop-color="#a855f7" />
                            </linearGradient>
                        </defs>
                    </svg>
                </div>
                <h1>Create account</h1>
                <p>Join us today — it only takes a minute</p>
            </div>

            <form id="signup-form" novalidate>
                <!-- Full Name -->
                <div class="input-group" id="name-group">
                    <label for="fullname">Full name</label>
                    <div class="input-wrapper">
                        <svg class="input-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                            stroke-width="1.8">
                            <path d="M20 21v-2a4 4 0 00-4-4H8a4 4 0 00-4 4v2" />
                            <circle cx="12" cy="7" r="4" />
                        </svg>
                        <input type="text" id="fullname" placeholder="John Doe" autocomplete="name" required>
                    </div>
                    <span class="error-msg" id="name-error"></span>
                </div>

                <!-- Email -->
                <div class="input-group" id="email-group">
                    <label for="email">Email address</label>
                    <div class="input-wrapper">
                        <svg class="input-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                            stroke-width="1.8">
                            <rect x="2" y="4" width="20" height="16" rx="2" />
                            <polyline points="22,6 12,13 2,6" />
                        </svg>
                        <input type="email" id="email" placeholder="you@example.com" autocomplete="email" required>
                    </div>
                    <span class="error-msg" id="email-error"></span>
                </div>

                <!-- Password -->
                <div class="input-group" id="password-group">
                    <label for="password">Password</label>
                    <div class="input-wrapper">
                        <svg class="input-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                            stroke-width="1.8">
                            <rect x="3" y="11" width="18" height="11" rx="2" />
                            <path d="M7 11V7a5 5 0 0110 0v4" />
                        </svg>
                        <input type="password" id="password" placeholder="••••••••" required>
                        <button type="button" class="toggle-pw" id="toggle-pw" aria-label="Toggle password">
                            <svg id="eye-open" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8">
                                <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z" />
                                <circle cx="12" cy="12" r="3" />
                            </svg>
                            <svg id="eye-closed" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                                stroke-width="1.8" style="display:none">
                                <path d="M17.94 17.94A10.07 10.07 0 0112 20c-7 0-11-8-11-8a18.45 18.45 0 015.06-5.94" />
                                <path d="M9.9 4.24A9.12 9.12 0 0112 4c7 0 11 8 11 8a18.5 18.5 0 01-2.16 3.19" />
                                <line x1="1" y1="1" x2="23" y2="23" />
                            </svg>
                        </button>
                    </div>
                    <!-- Password strength bar -->
                    <div class="strength-bar-container" id="strength-container">
                        <div class="strength-bar" id="strength-bar"></div>
                    </div>
                    <span class="strength-text" id="strength-text"></span>
                    <span class="error-msg" id="password-error"></span>
                </div>

                <!-- Confirm Password -->
                <div class="input-group" id="confirm-group">
                    <label for="confirm-password">Confirm password</label>
                    <div class="input-wrapper">
                        <svg class="input-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                            stroke-width="1.8">
                            <path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z" />
                        </svg>
                        <input type="password" id="confirm-password" placeholder="••••••••" required>
                    </div>
                    <span class="error-msg" id="confirm-error"></span>
                </div>

                <!-- Terms -->
                <div class="form-options" style="margin-bottom:1.5rem">
                    <label class="check-wrap">
                        <input type="checkbox" id="terms">
                        <span class="checkmark"></span>
                        <span>I agree to the <a href="#" style="color:var(--accent);text-decoration:none">Terms & Conditions</a></span>
                    </label>
                </div>

                <button type="submit" class="btn-login" id="btn-signup">
                    <span class="btn-text">Create account</span>
                    <div class="spinner-wrap" id="spinner-wrap">
                        <div class="spinner"></div>
                    </div>
                </button>
            </form>

            <div class="divider"><span>or sign up with</span></div>

            <div class="social-btns">
                <button class="btn-social" id="btn-google">
                    <svg viewBox="0 0 24 24" width="20" height="20">
                        <path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92a5.06 5.06 0 01-2.2 3.32v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.1z" fill="#4285F4" />
                        <path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853" />
                        <path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z" fill="#FBBC05" />
                        <path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335" />
                    </svg>
                    <span>Google</span>
                </button>
                <button class="btn-social" id="btn-github">
                    <svg viewBox="0 0 24 24" width="20" height="20" fill="currentColor">
                        <path d="M12 0C5.37 0 0 5.37 0 12c0 5.31 3.435 9.795 8.205 11.385.6.105.825-.255.825-.57 0-.285-.015-1.23-.015-2.235-3.015.555-3.795-.735-4.035-1.41-.135-.345-.72-1.41-1.23-1.695-.42-.225-1.02-.78-.015-.795.945-.015 1.62.87 1.845 1.23 1.08 1.815 2.805 1.305 3.495.99.105-.78.42-1.305.765-1.605-2.67-.3-5.46-1.335-5.46-5.925 0-1.305.465-2.385 1.23-3.225-.12-.3-.54-1.53.12-3.18 0 0 1.005-.315 3.3 1.23.96-.27 1.98-.405 3-.405s2.04.135 3 .405c2.295-1.56 3.3-1.23 3.3-1.23.66 1.65.24 2.88.12 3.18.765.84 1.23 1.905 1.23 3.225 0 4.605-2.805 5.625-5.475 5.925.435.375.81 1.095.81 2.22 0 1.605-.015 2.895-.015 3.3 0 .315.225.69.825.57A12.02 12.02 0 0024 12c0-6.63-5.37-12-12-12z" />
                    </svg>
                    <span>GitHub</span>
                </button>
            </div>

            <p class="signup-text">Already have an account? <a href="index.html" id="login-link">Sign in</a></p>
        </div>

        <div class="success-card" id="success-card">
            <div class="success-icon">
                <svg viewBox="0 0 60 60" fill="none">
                    <circle cx="30" cy="30" r="28" stroke="#34d399" stroke-width="2.5" opacity="0.3" />
                    <path class="check-path" d="M18 30L26 38L42 22" stroke="#34d399" stroke-width="3"
                        stroke-linecap="round" stroke-linejoin="round" />
                </svg>
            </div>
            <h2>Account created!</h2>
            <p>Your account has been successfully created.</p>
            <a href="index.html" class="btn-login" style="margin-top:1.5rem;display:inline-block;text-decoration:none;text-align:center">
                <span class="btn-text">Go to Login</span>
            </a>
        </div>
    </main>
    <script src="signup.js"></script>
</body>

</html>
